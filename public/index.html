<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merchy's Design Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bk:#111;--wh:#fafafa;--g1:#f5f5f5;--g2:#e5e5e5;--g3:#d4d4d4;--g4:#a3a3a3;
  --g5:#737373;--g6:#525252;--g7:#404040;--g8:#262626;
  --ac:#d4a017;--acd:#b8860b;--red:#dc2626;--grn:#16a34a;--blu:#2563eb;
  --r:8px;--sh:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--g1);color:var(--bk);line-height:1.6;min-height:100vh}
.hdr{background:var(--bk);color:var(--wh);padding:18px 32px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.hdr h1 span{color:var(--ac)}
.hdr-sub{font-size:12px;color:var(--g4);letter-spacing:1px;text-transform:uppercase}
.app{max-width:1200px;margin:0 auto;padding:24px 16px}
.steps{display:flex;gap:6px;margin-bottom:24px;justify-content:center}
.sdot{width:36px;height:5px;border-radius:3px;background:var(--g3);transition:.3s}
.sdot.on{background:var(--ac)}.sdot.done{background:var(--grn)}
.card{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);padding:28px;margin-bottom:16px}
.ct{font-size:20px;font-weight:700;margin-bottom:4px}
.cs{font-size:13px;color:var(--g5);margin-bottom:20px}
label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--g6);margin-bottom:6px}
input[type=text],input[type=email],input[type=tel],input[type=number],textarea,select{
  width:100%;padding:11px 13px;border:1.5px solid var(--g3);border-radius:var(--r);font-size:14px;font-family:inherit;transition:.2s;background:var(--wh)}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ac)}
textarea{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.fg{margin-bottom:14px}
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.ot{padding:14px 10px;border:2px solid var(--g2);border-radius:var(--r);text-align:center;cursor:pointer;transition:.2s;user-select:none}
.ot:hover{border-color:var(--g4)}.ot.sel{border-color:var(--ac);background:#fdf8e8}
.ot svg{width:36px;height:36px;margin:0 auto 6px;display:block}
.ot .tl{font-size:13px;font-weight:600}.ot .td{font-size:10px;color:var(--g5);margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:.2s;text-transform:uppercase;letter-spacing:1px}
.bp{background:var(--bk);color:var(--wh)}.bp:hover{background:var(--g8)}
.ba{background:var(--ac);color:var(--bk)}.ba:hover{background:var(--acd)}
.bo{background:transparent;color:var(--bk);border:2px solid var(--g3)}.bo:hover{border-color:var(--bk)}
.bs{padding:7px 14px;font-size:12px}
.br{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.alert-box{background:#fffbeb;border:1.5px solid var(--ac);border-radius:var(--r);padding:12px 16px;font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.alert-box svg{flex-shrink:0;margin-top:2px}

/* Style example cards */
.style-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:14px}
.style-card{border:2px solid var(--g2);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.2s}
.style-card:hover{border-color:var(--g4)}.style-card.sel{border-color:var(--ac);background:#fdf8e8}
.style-preview{height:140px;background:var(--g1);display:flex;align-items:center;justify-content:center;overflow:hidden}
.style-preview svg{width:100%;height:100%}
.style-info{padding:10px 12px}
.style-info .tl{font-size:13px;font-weight:700}.style-info .td{font-size:11px;color:var(--g5);margin-top:2px}

/* Per-product per-location notes */
.prod-loc-section{border:1.5px solid var(--g2);border-radius:var(--r);padding:16px;margin-bottom:12px}
.pls-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pls-header svg{width:24px;height:24px}
.pls-header .tl{font-size:15px;font-weight:700}
.loc-chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.loc-chip{padding:6px 14px;border:1.5px solid var(--g3);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;user-select:none}
.loc-chip:hover{border-color:var(--g5)}.loc-chip.sel{border-color:var(--ac);background:#fdf8e8;color:var(--bk)}
.loc-note-area{margin-top:8px}

/* Upload area */
.upload-area{border:2px dashed var(--g3);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.upload-area:hover{border-color:var(--ac);background:#fdf8e8}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-area svg{margin:0 auto 8px;display:block}
.upload-thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.upload-thumb{width:70px;height:70px;border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--g3)}
.upload-thumb img{width:100%;height:100%;object-fit:cover}
.upload-thumb .rm{position:absolute;top:2px;right:2px;width:18px;height:18px;background:var(--red);color:white;border:none;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Clarify bubbles */
.cq{background:var(--g1);border-left:3px solid var(--ac);border-radius:0 var(--r) var(--r) 0;padding:12px 16px;margin-bottom:10px}
.cq-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--acd);margin-bottom:3px}
.cq-t{font-size:13px;color:var(--g7)}

/* 3-option design picker */
.design-options{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.design-opt{border:2.5px solid var(--g2);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.design-opt:hover{border-color:var(--g5)}.design-opt.sel{border-color:var(--ac);box-shadow:0 0 0 2px var(--ac)}
.design-opt-view{height:280px;background:white;display:flex;align-items:center;justify-content:center;padding:10px}
.design-opt-view svg{width:100%;height:100%}
.design-opt-info{padding:10px 12px;background:var(--g1);border-top:1px solid var(--g2)}
.design-opt-info .tl{font-size:13px;font-weight:700}
.design-opt-info .td{font-size:11px;color:var(--g5);margin-top:2px}
.design-opt-badge{position:absolute;top:8px;left:8px;background:var(--bk);color:var(--wh);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px}

/* Canvas */
.canvas-area{display:grid;grid-template-columns:1fr 340px;gap:16px;min-height:500px}
.dvp{position:relative;background:white;border:2px solid var(--g2);border-radius:var(--r);overflow:hidden;cursor:crosshair;min-height:400px;display:flex;align-items:center;justify-content:center}
.pin{position:absolute;width:26px;height:26px;background:var(--red);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transform:translate(-50%,-50%);cursor:pointer;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.3);transition:.15s}
.pin:hover{transform:translate(-50%,-50%) scale(1.15)}.pin.on{background:var(--blu)}
.np{display:flex;flex-direction:column;gap:10px;max-height:500px;overflow-y:auto}
.nc{background:var(--wh);border:1.5px solid var(--g2);border-radius:var(--r);padding:12px;transition:.2s}
.nc.on{border-color:var(--blu)}
.nh{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.nn{width:22px;height:22px;background:var(--red);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.nc.on .nn{background:var(--blu)}

/* Spell check */
.spc{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:var(--r);padding:14px;margin-bottom:14px}
.spc.err{background:#fef2f2;border-color:#fecaca}

/* Export */
.eg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ec{border:2px solid var(--g2);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:.2s}
.ec:hover{border-color:var(--ac);background:#fdf8e8}

/* Generating */
.spinner{display:inline-block;width:36px;height:36px;border:3px solid var(--g2);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Chat */
.chat{background:var(--g1);border-radius:var(--r);padding:12px;max-height:250px;overflow-y:auto;margin-bottom:12px}
.cm{margin-bottom:10px;display:flex;gap:8px}
.ca{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ca.ai{background:var(--bk);color:var(--ac)}.ca.us{background:var(--ac);color:var(--bk)}
.cb{background:white;border-radius:var(--r);padding:8px 12px;font-size:13px;max-width:80%;box-shadow:var(--sh)}
.cm.fu{flex-direction:row-reverse}.cm.fu .cb{background:var(--bk);color:var(--wh)}
.ci{display:flex;gap:8px}.ci input{flex:1}

@media(max-width:900px){.canvas-area,.fr,.eg,.design-options{grid-template-columns:1fr}.hdr{padding:14px 16px}.hdr h1{font-size:16px}}
.hidden{display:none!important}
</style>
</head>

      <div class="fg">

        `).join('')}</div>`:''}

      <div class="fr">

  rPlacementPerProduct(){
    const f=this.s.form;
    return `<div style="margin-bottom:14px">
      <label>Placement per Product (select where the design goes on each)</label>
      ${f.products.map(pid=>{
        const p=this.PROD.find(x=>x.id===pid);
        const locs=this.PLACE[pid]||['Full Design'];
        if(!f.placements[pid]) f.placements[pid]=[];
        return `<div class="prod-loc-section">
          <div class="pls-header">${ICONS[pid]||''}<div class="tl">${p?p.label:pid}</div></div>

  // ============ STEP 1: CLARIFY ============
  rClarify(){
    const qs=this.genClarifyQs();
    this.s.clarifyQs=qs;
    return `<div class="card">
      <div class="ct">A Few Quick Questions</div>
      <div class="cs">Our Creative Director wants to make sure we nail this on the first pass.</div>

      <div class="chat"><div class="cm"><div class="ca ai">M</div><div class="cb">Good stuff. I'm reviewing your brief. Before I draft 3 options, let me lock in a few things so we don't waste revision rounds.</div></div></div>

      ${qs.map((q,i)=>`<div class="cq">
        <div class="cq-l">Question ${i+1}</div>
        <div class="cq-t">${q.q}</div>
        ${q.opts?`<div class="og" style="margin-top:8px">${q.opts.map(o=>`
          <div class="ot ${this.s.clarifyAns[i]===o?'sel':''}" data-cq="${i}" data-cv="${o}"><div class="tl">${o}</div></div>
        `).join('')}</div>`:`<div style="margin-top:8px"><input type="text" id="cqa_${i}" placeholder="Your answer..." value="${this.s.clarifyAns[i]||''}"></div>`}
      </div>`).join('')}

      ${this.rSpellCheck()}

      <div class="br">
        <button class="btn bo" onclick="APP.go(0)">Back</button>
        <button class="btn bp" onclick="APP.submitClarify()">Generate 3 Design Options</button>
      </div>
    </div>`;
  },

  genClarifyQs(){
    const f=this.s.form, qs=[];

    // Text hierarchy
    if(f.text&&f.text.includes('\n'))
      qs.push({q:"You have multiple text elements. What should someone read FIRST from 10 feet away? That becomes the dominant element.",opts:null});

    // Composition
    if(!f.style||f.style==='illustration'||f.style==='bold_type')
      qs.push({q:"For the overall layout - centered and symmetrical (our go-to for print), or is there a reason to break that?",opts:["Centered / Symmetrical","Asymmetric / Dynamic","Badge / Circular","Your call"]});

    // Decoration-specific
    if(f.decoration==='emb')
      qs.push({q:"For embroidery I keep things simple. How many thread colors, and flat or puff?",opts:["1-2 colors, flat","3-4 colors, flat","Puff on text only","Full puff"]});
    if(f.decoration==='sp')
      qs.push({q:"Screen print - how many ink colors? Fewer = cleaner + cheaper.",opts:["1 color","2 colors","3-4 colors","Full color (DTF better)"]});
    if(f.decoration==='dtf')
      qs.push({q:"DTF gives full color freedom but I still design clean. Color palette in mind, or should I keep to 3-4 strong colors?",opts:null});

    // Multi-product
    if(f.products.length>1)
      qs.push({q:`You selected ${f.products.length} products. Same design scaled for each, or a simplified version for smaller items (hats, sleeves)?`,opts:["Same design, scaled","Main + simplified for small items","Different sizing per product"]});

    // Per-product placement depth
    const hasMultiLoc=Object.values(f.placements).some(a=>a.length>1);
    if(hasMultiLoc)
      qs.push({q:"For products with multiple placements - is the secondary placement (sleeve, back, etc.) the same design smaller, or a different element like just text or a small logo?",opts:["Same design smaller","Small logo/icon only","Text only","Different for each"]});

    // Missing description
    if(!f.desc||f.desc.length<20)
      qs.push({q:"I need more visual direction. What's the vibe?",opts:["Vintage / Retro","Modern / Clean","Aggressive / Bold","Playful / Fun","Corporate","Streetwear"]});

    // Reorder check
    qs.push({q:"New design from scratch, or are you reordering / updating something we've done before?",opts:["Brand new","Reorder - same design","Update existing","I have a logo, build around it"]});

    // Deadline
    if(!f.deadline)
      qs.push({q:"When do you need these in hand? This affects how fast we move through approvals.",opts:null});

    return qs;
  },

  // ============ SPELL CHECK ============
  rSpellCheck(){
    const f=this.s.form;
    if(!f.text)return '';
    const errs=this.checkSpell(f.text);
    this.s.spellErrs=errs;
    if(!errs.length)
      return `<div class="spc"><div style="display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px"><span style="color:var(--grn)">&#10003;</span> Spelling Verified</div>
        <div style="margin-top:8px;padding:10px;background:white;border-radius:var(--r);font-family:monospace;font-size:13px;white-space:pre-wrap">${this.esc(f.text)}</div></div>`;
    return `<div class="spc err"><div style="display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px"><span style="color:var(--red)">!</span> ${errs.length} spelling issue${errs.length>1?'s':''} found</div>
      <div style="margin-top:8px">${errs.map((e,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--g2);font-size:13px">
        <span style="color:var(--red);text-decoration:line-through">${e.w}</span><span>-></span><span style="color:var(--grn);font-weight:600">${e.s}</span>
        <button class="btn bs bo" onclick="APP.fixSpell(${i})">Fix</button>
        <button class="btn bs" style="background:none;color:var(--g5)" onclick="APP.ignSpell(${i})">Ignore</button>
      </div>`).join('')}</div>
      <div style="margin-top:8px;padding:10px;background:white;border-radius:var(--r);font-family:monospace;font-size:13px;white-space:pre-wrap">${this.esc(f.text)}</div></div>`;
  },

  checkSpell(t){
    const dict={annuall:'annual',anual:'annual',barbeque:'barbecue',chamionship:'championship',comunity:'community',conferance:'conference',custome:'custom',establishd:'established',excellance:'excellence',expierence:'experience',famliy:'family',familly:'family',faimly:'family',independant:'independent',merchendise:'merchandise',merchanidse:'merchandise',merchandize:'merchandise',occassion:'occasion',organizaton:'organization',orginization:'organization',profesional:'professional',proffesional:'professional',quaility:'quality',restarant:'restaurant',resturant:'restaurant',recieved:'received',seperate:'separate',sucessful:'successful',succesful:'successful',tommorow:'tomorrow',tomorow:'tomorrow',definately:'definitely',definatly:'definitely',neccessary:'necessary',necesary:'necessary',accomodate:'accommodate',acheive:'achieve',agressive:'aggressive',begining:'beginning',beleive:'believe',bussiness:'business',buisness:'business',calender:'calendar',catagory:'category',comming:'coming',completly:'completely',dissapear:'disappear',enviroment:'environment',garantee:'guarantee',immediatly:'immediately',intresting:'interesting',knowlege:'knowledge',maintenace:'maintenance',noticable:'noticeable',occurence:'occurrence',posession:'possession',privelege:'privilege',rember:'remember',saftey:'safety',similer:'similar',sincerly:'sincerely',suprise:'surprise',untill:'until',teh:'the',adn:'and',taht:'that',wiht:'with',becuase:'because',alot:'a lot',fourty:'forty',truely:'truly',writting:'writing',wether:'whether'};
    const errs=[],seen=new Set();
    t.replace(/[^a-zA-Z\s'-]/g,' ').split(/\s+/).filter(w=>w.length>2).forEach(w=>{const l=w.toLowerCase();if(seen.has(l))return;seen.add(l);if(dict[l])errs.push({w,s:dict[l]})});
    return errs;
  },
  fixSpell(i){const e=this.s.spellErrs[i];if(e){const r=new RegExp(e.w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');this.s.form.text=this.s.form.text.replace(r,e.s);this.render()}},
  ignSpell(i){this.s.spellErrs.splice(i,1);this.render()},

  // ============ STEP 2: GENERATE (loading) ============
  rGenerate(){
    return `<div class="card" style="text-align:center;padding:60px 30px">
      <div class="spinner"></div>
      <div class="ct">Creative Director is drafting 3 options...</div>

  rAnnotateSection(design){

    // If we have AI-generated designs from Recraft, use those
    if (this.s.aiDesigns && this.s.aiDesigns.some(d => d.url)) {
      const titles = ['Badge / Crest Layout', 'Bold Typography', 'Custom Style'];
      const descs = ['Centered emblem composition.', 'Text-driven hierarchy.', 'Tailored to your style preference.'];
      return this.s.aiDesigns.map((d, i) => ({
        svg: d.url ? `<img src="${d.url}" style="width:100%;height:100%;object-fit:contain" alt="Design Option ${String.fromCharCode(65+i)}">` : this.svgBadge('DESIGN','',''),
        title: titles[i] || `Option ${String.fromCharCode(65+i)}`,
        desc: descs[i] || 'AI-generated design.',
        isImage: !!d.url,
        imageUrl: d.url
      }));
    }

    // Fallback to placeholder SVGs
    const f=this.s.form;
    const txt=f.text||'YOUR DESIGN';
    const lines=txt.split('\n').map(l=>l.replace(/^(FRONT|BACK|SLEEVE|SIDE):\s*/i,'').trim()).filter(Boolean);
    const main=lines[0]||'YOUR DESIGN';
    const sub=lines[1]||'';
    const biz=f.business||'';
    const st=f.style||'badge';

    const svgA=this.svgBadge(main,sub,biz);
    const svgB=this.svgType(main,sub,biz);
    const svgC=st==='rubber_hose'?this.svgRubberHose(main,sub,biz):
               st==='minimal'?this.svgMinimal(main,sub,biz):
               st==='retro_sport'?this.svgRetroSport(main,sub,biz):
               this.svgIllustration(main,sub,biz);

    return [
      {svg:svgA,title:'Badge / Crest Layout',desc:'Centered emblem with arched text. Classic Merchy\'s go-to.'},
      {svg:svgB,title:'Bold Typography',desc:'Text-driven hierarchy with strong visual weight.'},
      {svg:svgC,title:this.STYLES.find(s=>s.id===st)?.label||'Custom Layout',desc:'Tailored to your selected style preference.'}

  // ============ EVENT BINDING ============
  bind(){
    document.querySelectorAll('.ot[data-f]').forEach(t=>t.onclick=()=>{
      const f=t.dataset.f,v=t.dataset.v,m=t.dataset.m;
      if(m){
        if(!this.s.form[f])this.s.form[f]=[];
        const i=this.s.form[f].indexOf(v);
        if(i>-1){this.s.form[f].splice(i,1);delete this.s.form.placements[v]}
        else this.s.form[f].push(v);
      } else this.s.form[f]=v;
      this.render();
    });
    document.querySelectorAll('.style-card[data-f]').forEach(t=>t.onclick=()=>{
      this.s.form[t.dataset.f]=t.dataset.v;this.render();
    });
    document.querySelectorAll('.loc-chip[data-ploc]').forEach(c=>c.onclick=()=>{
      const pid=c.dataset.ploc,loc=c.dataset.loc;
      if(!this.s.form.placements[pid])this.s.form.placements[pid]=[];
      const a=this.s.form.placements[pid],i=a.indexOf(loc);
      if(i>-1)a.splice(i,1);else a.push(loc);
      this.render();
    });
    document.querySelectorAll('.ot[data-cq]').forEach(t=>t.onclick=()=>{
      this.s.clarifyAns[t.dataset.cq]=t.dataset.cv;this.render();
    });
    // File upload
    const fu=document.getElementById('f_ref_files');
    if(fu)fu.onchange=(e)=>{
      Array.from(e.target.files).forEach(f=>{
        const r=new FileReader();
        r.onload=(ev)=>{this.s.uploads.push({name:f.name,url:ev.target.result});this.render()};
        r.readAsDataURL(f);
      });
    };
  },

  rmUpload(i){this.s.uploads.splice(i,1);this.render()},

  // ============ API BASE URL ============
  API: window.location.origin,

  // ============ SMART LOOKUP ============
  _searchTimer: null,
  searchDebounce(val, type) {
    clearTimeout(this._searchTimer);
    if (val.length < 2) { this.s.lookupResults = ''; this.render(); return; }
    this._searchTimer = setTimeout(() => this.doSearch(val, type), 400);
  },

  async doSearch(query, type) {
    try {
      const resp = await fetch(`${this.API}/api/projects/search?query=${encodeURIComponent(query)}&type=${type}`);
      const data = await resp.json();
      if (data.projects && data.projects.length > 0) {
        this.s.lookupResults = `<div style="margin-top:8px">${data.projects.map(p =>
          `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border:1.5px solid var(--g2);border-radius:var(--r);margin-bottom:4px;cursor:pointer;transition:.2s;font-size:13px" onmouseover="this.style.borderColor='var(--ac)'" onmouseout="this.style.borderColor='var(--g2)'" onclick="APP.linkProject('${p.gid}','${p.name.replace(/'/g,"\\'")}')">
            <span style="color:var(--grn)">&#9679;</span>
            <span style="flex:1;font-weight:600">${p.name}</span>
            <span style="font-size:11px;color:var(--g5)">Link this project</span>
          </div>`
        ).join('')}</div>`;
      } else {
        this.s.lookupResults = `<div style="margin-top:6px;font-size:12px;color:var(--g5)">No matching projects found. Your submission will create a new request.</div>`;
      }
      this.render();
    } catch (err) {
      console.log('Search error:', err);
      this.s.lookupResults = `<div style="margin-top:6px;font-size:12px;color:var(--g5)">Search unavailable (backend not connected). Your submission will be saved locally.</div>`;
      this.render();
    }
  },

  linkProject(gid, name) {
    this.s.form.projectGid = gid;
    this.s.form.projectName = name;
    this.s.lookupResults = '';
    this.render();
  },

  // ============ FORM SUBMIT ============
  submitForm(){
    ['name','business','email','phone','qty','text','desc','gcol','dcol','notes','deadline'].forEach(f=>{
      const el=document.getElementById('f_'+f);if(el)this.s.form[f]=el.value;
    });
    // Grab PO number
    const poEl = document.getElementById('f_po');
    if (poEl && poEl.value) this.s.form.poNumber = poEl.value;

    if(!this.s.form.name)return alert('Please enter your name.');
    if(!this.s.form.email)return alert('Please enter your email.');
    if(!this.s.form.decoration)return alert('Please select a decoration type.');
    if(!this.s.form.products.length)return alert('Please select at least one product.');
    if(!this.s.form.desc&&!this.s.form.text)return alert('Please describe your design or enter the text for it.');
    this.go(1);
  },

  async submitClarify(){
    this.s.clarifyQs.forEach((q,i)=>{if(!q.opts){const el=document.getElementById('cqa_'+i);if(el)this.s.clarifyAns[i]=el.value}});
    this.go(2);

    // Try to generate via backend API (Recraft)
    try {
      const resp = await fetch(`${this.API}/api/generate`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(this.s.form)
      });
      const data = await resp.json();
      if (data.designs && data.designs.some(d => d.url)) {
        // We got real AI designs
        this.s.aiDesigns = data.designs;
        this.s.designSvg = true;
        this.go(3);
        return;
      }
    } catch (err) {
      console.log('Backend not available, using placeholder designs:', err.message);
    }

    // Fallback to placeholder SVGs
    this.s.aiDesigns = null;
    this.s.designSvg = true;
    this.go(3);
  },

  // ============ PIN / ANNOTATE ============
  pickDesign(i){this.s.selectedDesign=i;this.s.pins=[];this.s.activePin=null;this.render()},
  pinClick(e){
    const c=document.getElementById('dcanvas');if(!c)return;
    const r=c.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width)*100,y=((e.clientY-r.top)/r.height)*100;
    let reg='General';
    if(y<33)reg='Upper';else if(y<66)reg='Center';else reg='Lower';
    if(x<33)reg+=' Left';else if(x>66)reg+=' Right';
    this.s.pins.push({x,y,r:reg,n:''});this.s.activePin=this.s.pins.length-1;this.render();
    setTimeout(()=>{const el=document.getElementById('pin_note_'+(this.s.pins.length-1));/* no id set, use last textarea */},50);
  },
  selPin(i){this.s.activePin=i;this.render()},
  rmPin(i){this.s.pins.splice(i,1);this.s.activePin=null;this.render()},
  clearPins(){this.s.pins=[];this.s.activePin=null;this.render()},

  submitNotes(){
    const notes=this.s.pins.filter(p=>p.n.trim());
    if(!notes.length)return alert('Add notes to at least one pin.');
    this.s.aiMsgs.push({f:'user',t:`Submitted ${notes.length} revision note${notes.length>1?'s':''}.`});
    let r="Got it. Working on:\n\n";
    notes.forEach((n,i)=>{r+=`Pin ${i+1} (${n.r}): ${n.n}\n`});
    r+="\nKeeping it bold, clean, print-ready. Revision incoming.";
    this.s.aiMsgs.push({f:'ai',t:r});this.render();
  },

  sendMsg(){
    const el=document.getElementById('ai_in');if(!el||!el.value.trim())return;
    const m=el.value.trim();this.s.aiMsgs.push({f:'user',t:m});
    this.s.aiMsgs.push({f:'ai',t:this.aiReply(m)});this.render();
  },

  aiReply(m){
    const l=m.toLowerCase();
    if(l.includes('color')||l.includes('colour'))return "We stay B&W until structure is approved. Once you greenlight the layout, I'll add your palette. What colors are you thinking?";
    if(l.includes('bigger')||l.includes('larger')||l.includes('size'))return "Noted. Remember the silhouette test - if you squint, you should still recognize the main element. Drop a pin on exactly what needs scaling.";
    if(l.includes('font')||l.includes('text')||l.includes('type'))return "Typography is part of the design, not placed on top. Bold and aggressive, or clean and classic?";
    if(l.includes('simpl')||l.includes('less')||l.includes('too much'))return "Clean over complex, always. I'll strip anything that doesn't serve the design. Every element earns its place.";
    if(l.includes('love')||l.includes('perfect')||l.includes('great')||l.includes('approv'))return "Solid. Hit 'Approve & Export' and I'll package this in SVG, PDF, and EPS - all print-ready.";
    if(l.includes('embroid')||l.includes('stitch'))return "For embroidery: thick line work, clean separations, no tiny details. How many colors max? Flat or puff?";
    return "Drop a pin on the exact area so there's zero confusion. Goal: get this right in as few rounds as possible.";
  },

  // ============ EXPORT ============
  expSVG(){
    const d=this.gen3Designs()[this.s.selectedDesign||0];
    const b=new Blob([d.svg],{type:'image/svg+xml'});this.dl(b,`merchys-design-${Date.now()}.svg`);
  },
  expPDF(){
    const d=this.gen3Designs()[this.s.selectedDesign||0];
    const h=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Merchy's Design</title><style>@page{size:8.5in 11in;margin:.5in}body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}</style></head><body>${d.svg}</body></html>`;
    const b=new Blob([h],{type:'text/html'});this.dl(b,`merchys-design-${Date.now()}-print.html`);
    alert('Open this file in your browser and use Print > Save as PDF for vector PDF output.');
  },
  expEPS(){
    const f=this.s.form,m=(f.text||'DESIGN').split('\n')[0].replace(/^(FRONT|BACK):\s*/i,'').trim();
    const eps=`%!PS-Adobe-3.0 EPSF-3.0\n%%BoundingBox: 0 0 400 400\n%%Title: Merchy's Design - ${m}\n%%Creator: Merchy's Design Studio\nnewpath 200 200 170 0 360 arc 7 setlinewidth stroke\nnewpath 200 200 155 0 360 arc 2.5 setlinewidth stroke\n/Helvetica-Bold findfont 22 scalefont setfont\n200 210 moveto (${m.toUpperCase()}) dup stringwidth pop 2 div neg 0 rmoveto show\nshowpage\n%%EOF`;
    const b=new Blob([eps],{type:'application/postscript'});this.dl(b,`merchys-design-${Date.now()}.eps`);
  },
  dl(b,n){const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)},

  async submitFinal(){
    const f=this.s.form;
    const summary={
      name:f.name, business:f.business, email:f.email, phone:f.phone,
      decoration:f.decoration, products:f.products, placements:f.placements,
      style:f.style, text:f.text, desc:f.desc,
      gcol:f.gcol, dcol:f.dcol, qty:f.qty, deadline:f.deadline, notes:f.notes,
      poNumber:f.poNumber, projectGid:f.projectGid, projectName:f.projectName,
      selectedOption:String.fromCharCode(65+(this.s.selectedDesign||0)),
      pins:this.s.pins.filter(p=>p.n),
      clarifyAnswers:this.s.clarifyAns,
      submittedAt:new Date().toISOString()
    };

    // Try to submit to backend (Asana + email)
    try {
      const resp = await fetch(`${this.API}/api/submit`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(summary)
      });
      const data = await resp.json();
      console.log('Submission result:', data);

      let msg = `Design submitted to Merchy's team!\n\nClient: ${f.name}\nProducts: ${f.products.map(p=>this.PROD.find(x=>x.id===p)?.label).join(', ')}\nSelected: Option ${String.fromCharCode(65+(this.s.selectedDesign||0))}`;

      if (data.results?.asana?.success) {
        msg += `\n\nAsana: ${data.results.asana.action === 'po_matched' ? 'Linked to project: ' + data.results.asana.projectName : data.results.asana.action === 'presale_created' ? 'New presale task created' : 'Design notes posted'}`;
      }
      if (data.results?.email?.success) {
        msg += `\nConfirmation email sent to ${f.email}`;
      }

      msg += '\n\nWe\'ll review and get back to you within 24 hours.';
      alert(msg);
    } catch (err) {
      // Backend not available - save locally
      console.log('Backend not available, saving locally:', err.message);
      const blob = new Blob([JSON.stringify(summary, null, 2)], {type: 'application/json'});
      this.dl(blob, `merchys-design-request-${Date.now()}.json`);
      alert(`Design request saved locally (backend not connected).\n\nClient: ${f.name}\nSelected: Option ${String.fromCharCode(65+(this.s.selectedDesign||0))}\n\nThe JSON file has been downloaded. Send it to your Merchy's team.`);
    }
  },

  // ============ NAV / HELPERS ============
  go(n){this.s.step=n;this.render();window.scrollTo(0,0)},
  esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
};

APP.init();
</script>
